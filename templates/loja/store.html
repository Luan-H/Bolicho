{% extends 'base.html' %}
{% load static %}
{% block content %}


<section class="section-pagetop bg">
	<div class="container">
		<h2 class="title-page">Nossa Loja</h2>

	</div>
</section>

<section class="section-content padding-y">
	<div class="container">
		<div class="row">
			<aside class="col-md-3">
				<div class="card">
					<article class="filter-group">
						<header class="card-header">
							<a href="#" data-toggle="collapse" data-target="#collapse_1" aria-expanded="true" class="">
								<i class="icon-control fa fa-chevron-down"></i>
								<h6 class="title">Categorias</h6>
							</a>
						</header>
						<div class="filter-content collapse show" id="collapse_1">
							<div class="card-body">

								<ul class="list-menu">
									<li><a class="dropdown-item" href="{% url 'loja' %}">Todos</a></li>
									{% for categoria in listaCategorias %}
									 <li><a class="dropdown-item" href="{{ categoria.get_url }}">{{ categoria.categoria_nome }} </a></li>
									{% endfor %}
								</ul>

							</div> <!-- card-body.// -->
						</div>
					</article> <!-- filter-group  .// -->
					

					<article class="filter-group">
						<header class="card-header">
							<a href="#" data-toggle="collapse" data-target="#collapse_3" aria-expanded="true" class="">
								<i class="icon-control fa fa-chevron-down"></i>
								<h6 class="title">Price range </h6>
							</a>
						</header>
						<div class="filter-content collapse show" id="collapse_3" style="">
							<div class="card-body">

								<div class="form-row">
									<div class="form-group col-md-6">
										<label>Min</label>
										<!-- <input class="form-control" placeholder="$0" type="number"> -->
										<select class="mr-2 form-control">
											<option value="0">$0</option>
											<option value="50">$50</option>
											<option value="100">$100</option>
											<option value="150">$150</option>
											<option value="200">$200</option>
											<option value="500">$500</option>
											<option value="1000">$1000</option>
										</select>
									</div>
									<div class="form-group text-right col-md-6">
										<label>Max</label>
										<select class="mr-2 form-control">
											<option value="50">$50</option>
											<option value="100">$100</option>
											<option value="150">$150</option>
											<option value="200">$200</option>
											<option value="500">$500</option>
											<option value="1000">$1000</option>
											<option value="2000">$2000+</option>
										</select>
									</div>
								</div> <!-- form-row.// -->
								<button class="btn btn-block btn-primary">Apply</button>
							</div><!-- card-body.// -->
						</div>
					</article> <!-- filter-group .// -->

				</div> <!-- card.// -->

			</aside> <!-- col.// -->
			<main class="col-md-9">

				<header class="border-bottom mb-4 pb-3">
					<div class="form-inline">
						<span class="mr-md-auto">32 Items found </span>

					</div>
				</header><!-- sect-heading -->

				<div class="row">
					{% for produtos in prods %}
					<div class="col-md-4">
						<figure class="card card-product-grid">
							<div class="img-wrap">
								<img src="{{ produtos.imagem.url }}" href="{{ produtos.get_url }}">
							</div>
							<figcaption class="info-wrap">
								<div class="fix-height">
									<a href="{{ produtos.get_url }}" class="title">{{ produtos.nome }}</a>
									<div class="price-wrap mt-2">
										<span class="price">R$ {{ produtos.preco }}</span>
									</div>
								</div>
								<a href={% url 'adicionarCarrinho' produtos.id %} class="btn btn-block btn-success">Added to cart</a>
							</figcaption>
						</figure>
					</div>
					{% endfor %}

			</main> <!-- col.// -->

		</div>

	</div> <!-- container .//  -->
	{% endblock %}
